name: CI/CD Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Get code
    - name: Checkout repository
      uses: actions/checkout@v3

    # -----------------------
    # PYTHON BACKEND (API GATEWAY)
    # -----------------------
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      run: |
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
        pip install pytest || true

    - name: Run Python tests
      run: |
        pytest backend || true

    # -----------------------
    # JAVA FRONTEND
    # -----------------------
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        java-version: '17'

    - name: Compile Java frontend
      run: |
        if [ -d frontend ]; then
          find frontend -name "*.java" > sources.txt
          if [ -s sources.txt ]; then javac @sources.txt; fi
        fi

    # -----------------------
    # DOCKER (optional build check only)
    # -----------------------
    - name: Build backend Docker image
      run: |
        if [ -d backend ]; then docker build -t backend ./backend || true; fi

  deploy:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
    - name: Deployment placeholder
      run: echo "Deployment step ready - will connect to server later"
